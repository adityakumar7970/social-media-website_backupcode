<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Socialix</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">Socialix</div>
    </header>

    <main class="main-content">
      <section class="hero">
        <div class="hero-card">
          <h1>Reset your password</h1>
          <p>Enter your email address and we'll send you a link to reset your password.</p>

          <form id="forgotPasswordForm" class="auth-form active" aria-label="Forgot password form">
            <div class="field">
              <label for="email">Email address</label>
              <input type="email" id="email" placeholder="you@example.com" required />
            </div>
            <button type="submit" class="primary-button">Send reset link</button>
            <a href="index.html" class="secondary-button" style="display: inline-block; text-align: center; text-decoration: none;">Back to login</a>
          </form>

          <div id="message" class="message" style="display: none;"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
