<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socialix Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">Socialix</div>
    </header>

    <main class="main-content">
      <section class="hero">
        <div class="hero-card">
          <h1>Access your Socialix account</h1>
          <p>Use the login form if you already have an account, or sign up now to create a new profile.</p>

          <div class="auth-toggle">
            <button type="button" id="showLoginButton" class="secondary-button active">Login</button>
            <button type="button" id="showSignupButton" class="secondary-button">Sign up</button>
          </div>

          <div class="auth-panels">
            <form id="loginForm" class="auth-form active" aria-label="Login form">
              <div class="field">
                <label for="loginId">Email or Phone</label>
                <input type="text" id="loginId" placeholder="Email address or phone number" required />
              </div>
              <div class="field">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" required />
              </div>
              <button type="submit" class="primary-button">Login</button>
              <a href="forgot-password.html" class="forgot-password-link">Forgot Password?</a>
              <button type="button" id="switchToSignup" class="secondary-button">Create account</button>
            </form>

            <form id="signupForm" class="auth-form" aria-label="Signup form">
              <div class="field-row">
                <div class="field">
                  <label for="firstName">First name</label>
                  <input type="text" id="firstName" placeholder="First name" required />
                </div>
                <div class="field">
                  <label for="lastName">Last name</label>
                  <input type="text" id="lastName" placeholder="Last name" required />
                </div>
              </div>

              <div class="field-row">
                <div class="field">
                  <label for="signupEmail">Email address</label>
                  <input type="email" id="signupEmail" placeholder="you@example.com" />
                </div>
                <div class="field">
                  <label for="signupPhone">Mobile number</label>
                  <input type="tel" id="signupPhone" placeholder="123-456-7890" />
                </div>
              </div>

              <div class="field-row">
                <div class="field">
                  <label for="signupUsername">Username</label>
                  <input type="text" id="signupUsername" placeholder="Choose a username" required />
                </div>
                <div class="field">
                  <label for="signupPassword">Password</label>
                  <input type="password" id="signupPassword" placeholder="Create a password" required />
                </div>
              </div>

              <div class="field-row">
                <div class="field">
                  <label for="signupDob">Date of birth</label>
                  <input type="date" id="signupDob" required />
                </div>
                <div class="field">
                  <label for="signupGender">Gender</label>
                  <select id="signupGender" required>
                    <option value="">Select gender</option>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                    <option value="prefer-not-to-say">Prefer not to say</option>
                  </select>
                </div>
              </div>

              <button type="submit" class="primary-button">Sign up</button>
              <button type="button" id="switchToLogin" class="secondary-button">Already signed up?</button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
