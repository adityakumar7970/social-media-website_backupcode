<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Socialix</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">Socialix</div>
    </header>

    <main class="main-content">
      <section class="hero">
        <div class="hero-card">
          <h1>Reset your password</h1>
          <p>Enter your new password below.</p>

          <form id="resetPasswordForm" class="auth-form active" aria-label="Reset password form">
            <div class="field">
              <label for="newPassword">New password</label>
              <input type="password" id="newPassword" placeholder="Enter new password" required minlength="6" />
            </div>
            <div class="field">
              <label for="confirmPassword">Confirm new password</label>
              <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6" />
            </div>
            <button type="submit" class="primary-button">Reset password</button>
            <a href="index.html" class="secondary-button" style="display: inline-block; text-align: center; text-decoration: none;">Back to login</a>
          </form>

          <div id="message" class="message" style="display: none;"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
